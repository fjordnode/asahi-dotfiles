# ── Applications ──────────────────────────────────────────────
bindd = SUPER, RETURN, Terminal, exec, kitty
bindd = SUPER ALT, RETURN, Tmux, exec, kitty tmux
bindd = SUPER SHIFT, F, File manager, exec, dolphin
bindd = SUPER SHIFT, B, Browser, exec, xdg-open https://
bindd = SUPER SHIFT, D, Docker, exec, kitty -e lazydocker

# ── Launcher ─────────────────────────────────────────────────
bindd = SUPER, SPACE, Launch apps, exec, walker
bindd = SUPER CTRL, E, Emoji picker, exec, walker -m symbols

# ── Clipboard ────────────────────────────────────────────────
unbind = SUPER CTRL, V
unbind = SUPER SHIFT, V
unbind = SUPER ALT, V
bindd = SUPER SHIFT, V, Clipboard manager, exec, walker -m clipboard
bindd = SUPER ALT, V, Clipboard paste, exec, clipboard-paste

# ── Screenshot ───────────────────────────────────────────────
bindd = , PRINT, Screenshot, exec, grim -g "$(slurp)" - | satty -f -
bindd = SUPER SHIFT, S, Screenshot (area), exec, grim -g "$(slurp)" - | satty -f -
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# ── Media keys ───────────────────────────────────────────────
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, brightnessctl set +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-

bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, brightnessctl set +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, brightnessctl set 1%-

bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# ── Tiling ───────────────────────────────────────────────────
bindd = SUPER, W, Close window, exec, close-or-tab
bindd = CTRL ALT, DELETE, Close all windows, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I{} hyprctl dispatch closewindow address:{}
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle floating, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Focus
bindd = SUPER, LEFT, Focus left, movefocus, l
bindd = SUPER, RIGHT, Focus right, movefocus, r
bindd = SUPER, UP, Focus up, movefocus, u
bindd = SUPER, DOWN, Focus down, movefocus, d

# Workspaces
bindd = SUPER, code:10, Workspace 1, workspace, 1
bindd = SUPER, code:11, Workspace 2, workspace, 2
bindd = SUPER, code:12, Workspace 3, workspace, 3
bindd = SUPER, code:13, Workspace 4, workspace, 4
bindd = SUPER, code:14, Workspace 5, workspace, 5
bindd = SUPER, code:15, Workspace 6, workspace, 6
bindd = SUPER, code:16, Workspace 7, workspace, 7
bindd = SUPER, code:17, Workspace 8, workspace, 8
bindd = SUPER, code:18, Workspace 9, workspace, 9
bindd = SUPER, code:19, Workspace 10, workspace, 10

bindd = SUPER SHIFT, code:10, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move to scratchpad, movetoworkspacesilent, special:scratchpad

# Workspace navigation
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Swap windows
bindd = SUPER SHIFT, LEFT, Swap left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap down, swapwindow, d

# Alt-Tab
bindd = ALT, TAB, Cycle next, cyclenext
bindd = ALT SHIFT, TAB, Cycle prev, cyclenext, prev
bindd = ALT, TAB, Bring to top, bringactivetotop
bindd = ALT SHIFT, TAB, Bring to top, bringactivetotop

# Resize
bindd = SUPER, code:20, Shrink width, resizeactive, -100 0
bindd = SUPER, code:21, Grow width, resizeactive, 100 0
bindd = SUPER SHIFT, code:20, Shrink height, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Grow height, resizeactive, 0 100

# Mouse
bindd = SUPER, mouse_down, Scroll workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll workspace backward, workspace, e-1
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Groups
bindd = SUPER, G, Toggle grouping, togglegroup
bindd = SUPER ALT, G, Move out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Join group left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Join group right, moveintogroup, r
bindd = SUPER ALT, TAB, Next in group, changegroupactive, f

# ── TUI tools ────────────────────────────────────────────────
bindd = SUPER CTRL, W, WiFi, exec, launch-tui impala
bindd = SUPER CTRL, B, Bluetooth, exec, launch-tui bluetui
bindd = SUPER CTRL, T, Activity, exec, launch-tui btop

# ── Notifications ────────────────────────────────────────────
bindd = SUPER, COMMA, Dismiss notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all, exec, makoctl dismiss --all
bindd = SUPER ALT, COMMA, Invoke last, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last, exec, makoctl restore

# ── Misc ─────────────────────────────────────────────────────
bindd = SUPER SHIFT, SPACE, Toggle waybar, exec, pkill -SIGUSR1 waybar
bindd = SUPER, BACKSPACE, Toggle transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = SUPER CTRL, L, Lock, exec, hyprlock

# Wallpaper picker
bindd = SUPER SHIFT, W, Wallpaper picker, exec, kitty --app-id tui.wallpaper -e wallpaper-picker

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1
