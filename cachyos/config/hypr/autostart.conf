# Autostart
exec-once = hyprctl setcursor Breeze_Light 20
exec-once = xrdb -merge ~/.Xresources

# Core services
exec-once = hypridle
exec-once = dunst
exec-once = waybar

# Systemd env export (for slow app launch fix)
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Wallpaper
exec-once = swww-daemon && swww img ~/Pictures/wallpaper.png --transition-type none

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --watch yoink-watcher
exec-once = primary-to-clipboard

# OSD
exec-once = swayosd-server -s ~/.config/themes/current/swayosd.css

# Walker launcher
exec-once = walker --gapplication-service

# macOS-style shortcuts for Brave
exec-once = xremap --watch ~/.config/xremap/config.yml

# NetworkManager applet
exec-once = command -v nm-applet >/dev/null 2>&1 && exec nm-applet --indicator

# Polkit
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Default apps on login
exec-once = [workspace 1] brave-browser
exec-once = sleep 1.5 && hyprctl dispatch workspace 2 && kitty
exec-once = sleep 2 && kitty
exec-once = sleep 2.5 && kitty
