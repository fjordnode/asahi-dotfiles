# Window rules
windowrule = suppress_event maximize, match:class .*
windowrule = tag +default-opacity, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# No border on Brave
windowrule = border_size 0, match:class brave-browser

# Float TUI tools
windowrule = float on, match:class tui.impala
windowrule = center on, match:class tui.impala
windowrule = size 600 400, match:class tui.impala

windowrule = float on, match:class tui.bluetui
windowrule = center on, match:class tui.bluetui
windowrule = size 600 400, match:class tui.bluetui

# Yoink clipboard manager
windowrule = float on, match:class tui.yoink
windowrule = center on, match:class tui.yoink
windowrule = size 900 600, match:class tui.yoink
windowrule = opacity 0.97 0.97, match:class tui.yoink

# Satty screenshot editor
windowrule = float on, match:class com.gabm.satty
windowrule = center on, match:class com.gabm.satty
windowrule = opacity 1.0 override 1.0 override, match:class (?i)satty

# Theme picker
windowrule = float on, match:class tui.themepicker
windowrule = center on, match:class tui.themepicker
windowrule = size 700 500, match:class tui.themepicker

# Wallpaper picker
windowrule = float on, match:class tui.wallpaper
windowrule = center on, match:class tui.wallpaper
windowrule = size 1400 850, match:class tui.wallpaper

# Screensaver (cmatrix)
windowrule = fullscreen on, match:class screensaver
