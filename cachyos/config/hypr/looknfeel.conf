# Minimal look — no blur, no shadows, no animations
general {
  gaps_in = 1
  gaps_out = 0
  border_size = 1
  col.active_border = rgba(e68e0dff)
  col.inactive_border = rgba(333333ff)
  layout = dwindle
}

dwindle {
  pseudotile = true
  preserve_split = true
}

decoration {
  rounding = 0
  active_opacity = 0.97
  inactive_opacity = 0.97
  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = false
}

render {
  direct_scanout = false
}

# No gaps on workspaces 1–2
workspace = 1, gapsin:0
workspace = 2, gapsin:0

# Global opacity
windowrule = opacity 1.0 override 0.98 override, match:class .*
windowrule = opacity 0.98 override 0.95 override, match:class ^(kitty|ghostty|com.mitchellh.ghostty)$

group {
  col.border_active = rgba(e68e0dff)
  col.border_inactive = rgba(333333ff)
}
