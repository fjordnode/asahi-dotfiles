general {
    gaps_in = 1
    gaps_out = 0
    border_size = 1
}

decoration {
    rounding = 0
    active_opacity = 0.97
    inactive_opacity = 0.97
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

render {
    direct_scanout = false
}


# No gaps or borders on ws1
workspace = 1, gapsin:0

# No gaps on ws2
workspace = 2, gapsin:0

# Global opacity override
windowrule = opacity 1.0 override 0.98 override, match:class .*

# Terminal-only opacity
windowrule = opacity 0.98 override 0.95 override, match:class ^(kitty|kitty-dropterm|ghostty|com.mitchellh.ghostty)$
