general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# 1. Darken — 1min
listener {
    timeout = 60
    on-timeout = omarchy-hypridle-display-brightness dim    # dim display to 5% if currently above 5%
    on-resume = omarchy-hypridle-display-brightness restore # restore only if dim changed it
}

# 2. Screensaver + keyboard light off — 2min
listener {
    timeout = 120
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

listener {
    timeout = 120
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0  # keyboard backlight off
    on-resume = brightnessctl -rd '*::kbd_backlight'          # keyboard backlight restore
}

# 3. Screen off + lock — 3min
listener {
    timeout = 180
    on-timeout = hyprctl dispatch dpms off                   # screen off
    on-resume = hyprctl dispatch dpms on                     # screen on
}

listener {
    timeout = 180
    on-timeout = loginctl lock-session
}

# 4. Sleep — 10min
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
