# Application bindings (adapted: kitty instead of ghostty)
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- kitty
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- kitty tmux
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- xdg-open https://
bindd = SUPER SHIFT, D, Docker, exec, uwsm-app -- kitty -e lazydocker
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

# Screenshot
bindd = SUPER SHIFT, S, Screenshot (area), exec, omarchy-cmd-screenshot region

# Float the theme picker (overlay style)
windowrule = float on, match:class org.omarchy.themepicker
windowrule = center on, match:class org.omarchy.themepicker
windowrule = pin on, match:class org.omarchy.themepicker
windowrule = border_size 1, match:class org.omarchy.themepicker
windowrule = rounding 12, match:class org.omarchy.themepicker

# No border on Brave
windowrule = border_size 0, match:class brave-browser

# Float TUI tools (WiFi / Bluetooth)
windowrule = float on, match:class org.omarchy.impala
windowrule = center on, match:class org.omarchy.impala
windowrule = size 600 400, match:class org.omarchy.impala

windowrule = float on, match:class org.omarchy.bluetui
windowrule = center on, match:class org.omarchy.bluetui
windowrule = size 600 400, match:class org.omarchy.bluetui

# Keyboard backlight (SUPER + brightness keys)
bindeld = SUPER, XF86MonBrightnessUp, Keyboard brightness up, exec, omarchy-brightness-keyboard up
bindeld = SUPER, XF86MonBrightnessDown, Keyboard brightness down, exec, omarchy-brightness-keyboard down

# Cheatsheet (floating)
bindd = SUPER, period, Cheatsheet, exec, uwsm-app -- kitty --app-id org.omarchy.cheatsheet -e bat --paging always --style plain ~/.config/omarchy/cheatsheet.txt
windowrule = float on, match:class org.omarchy.cheatsheet
windowrule = center on, match:class org.omarchy.cheatsheet
windowrule = size 700 550, match:class org.omarchy.cheatsheet

# Clipboard shortcuts
unbind = SUPER CTRL, V
unbind = SUPER SHIFT, V
unbind = SUPER ALT, V
bindd = SUPER SHIFT, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard
bindd = SUPER ALT, V, Clipboard paste, exec, omarchy-clipboard-paste

# Wallpaper picker (fzf + kitty image preview)
bindd = SUPER SHIFT, W, Wallpaper picker, exec, uwsm-app -- kitty --app-id org.omarchy.wallpaper -e omarchy-wallpaper-picker
windowrule = float on, match:class org.omarchy.wallpaper
windowrule = center on, match:class org.omarchy.wallpaper
windowrule = size 1400 850, match:class org.omarchy.wallpaper

