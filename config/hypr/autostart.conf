# Authoritative autostart — replaces omarchy-default/autostart.conf entirely
# (omarchy-default/autostart.conf is no longer sourced from hyprland.conf)

# Environment
env = OMARCHY_PATH,$HOME/.local/share/omarchy
env = PATH,$HOME/.bun/bin:$HOME/.local/npm-global/bin:$HOME/.opencode/bin:$HOME/.local/nvim/bin:$HOME/.cargo/bin:$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin
env = EDITOR,nvim
env = VISUAL,nvim
env = XCURSOR_THEME,Breeze_Light
env = XCURSOR_SIZE,26
env = HYPRCURSOR_THEME,Breeze_Light
env = HYPRCURSOR_SIZE,26
env = GTK_USE_PORTAL,1

# Cursor theme
exec-once = hyprctl setcursor Breeze_Light 26
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Breeze_Light'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 26

# Core services (from omarchy-default)
exec-once = uwsm-app -- hypridle
exec-once = omarchy-hypridle-power-monitor
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar

# Slow app launch fix — set systemd vars (from omarchy-default)
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user restart elephant.service

# Wallpaper via swww
exec-once = swww-daemon --format xrgb && swww img ~/.config/omarchy/current/background --transition-type none

# Clipboard manager (cliphist)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Copy highlighted text to clipboard automatically (primary selection → clipboard, debounced)
exec-once = primary-to-clipboard

# On-screen display for brightness/volume (with custom stylesheet)
exec-once = swayosd-server -s ~/.config/swayosd/style.css

# Ensure Walker app-launch actions survive refreshes/updates
exec-once = omarchy-walker-selfheal

# Walker launcher service
exec-once = uwsm-app -- walker --gapplication-service

# macOS-style shortcuts for Brave (Super instead of Ctrl)
exec-once = ~/.cargo/bin/xremap --watch ~/.config/xremap/config.yml

# NetworkManager applet
exec-once = command -v nm-applet >/dev/null 2>&1 && exec nm-applet --indicator

# Polkit agent (auto-detects available agent)
exec-once = $HOME/.config/hypr/scripts/Polkit.sh

# Warn if SDDM Omarchy Qt patch is overwritten by updates
exec-once = omarchy-sddm-theme-guard --notify >/dev/null 2>&1

# Default apps on login
exec-once = [workspace 1] uwsm-app -- brave-browser
exec-once = sleep 1.5 && hyprctl dispatch workspace 2 && uwsm-app -- kitty
exec-once = sleep 2 && uwsm-app -- kitty
exec-once = sleep 2.5 && uwsm-app -- kitty
