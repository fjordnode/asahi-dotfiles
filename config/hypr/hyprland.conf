# Omarchy-style Hyprland config (adapted for Fedora/Asahi)
# Uses local vendored defaults from ~/.config/hypr/omarchy-default/

# Source local Omarchy defaults snapshot (autostart is handled entirely by user autostart.conf)
source = ~/.config/hypr/omarchy-default/bindings/media.conf
source = ~/.config/hypr/omarchy-default/bindings/clipboard.conf
source = ~/.config/hypr/omarchy-default/bindings/tiling-v2.conf
source = ~/.config/hypr/omarchy-default/bindings/utilities.conf
source = ~/.config/hypr/omarchy-default/envs.conf
source = ~/.config/hypr/omarchy-default/looknfeel.conf
source = ~/.config/hypr/omarchy-default/input.conf
source = ~/.config/hypr/omarchy-default/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# User overrides
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf
